<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aestrela Countdown</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="countdown-page" aria-label="Aestrela Chapter I Homecoming countdown">
      <div class="background" aria-hidden="true"></div>

      <section class="design-frame">
        <img
          class="brand-mark"
          src="aestrela-logo-transparent.png"
          alt="Aestrela"
        >
        <p class="est-mark">EST. 2025</p>
        <h1 class="chapter-mark">Chapter I: Homecoming</h1>

        <div class="countdown" aria-live="polite">
          <div class="time-cell">
            <span class="time-value" data-unit="days">00</span>
            <span class="time-label">days</span>
          </div>
          <div class="time-cell">
            <span class="time-value" data-unit="hours">00</span>
            <span class="time-label">hours</span>
          </div>
          <div class="time-cell">
            <span class="time-value" data-unit="minutes">00</span>
            <span class="time-label">minutes</span>
          </div>
          <div class="time-cell">
            <span class="time-value" data-unit="seconds">00</span>
            <span class="time-label">seconds</span>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
